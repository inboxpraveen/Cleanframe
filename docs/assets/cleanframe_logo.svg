<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">CleanFrame logo</title>
  <desc id="desc">Logo for CleanFrame, the reproducible data-cleaning engine for Python.</desc>

  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="brandSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CFFAFE"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
    </style>
  </defs>

  <g transform="translate(40 40)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="240" rx="56" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="26" y="26" width="188" height="188" rx="36" fill="url(#brandSoft)" opacity="0.45"/>

    <!-- frame brackets -->
    <g fill="none" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M68 98V78c0-8.8 7.2-16 16-16h28"/>
      <path d="M172 98V78c0-8.8-7.2-16-16-16h-28"/>
      <path d="M68 142v20c0 8.8 7.2 16 16 16h28"/>
      <path d="M172 142v20c0 8.8-7.2 16-16 16h-28"/>
    </g>

    <!-- data grid -->
    <g transform="translate(82 84)">
      <rect x="0" y="0" width="76" height="72" rx="18" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
      <path d="M25.33 0V72M50.66 0V72M0 24H76M0 48H76" stroke="#CBD5E1" stroke-width="1.25"/>
      <circle cx="12.66" cy="12" r="5" fill="#94A3B8"/>
      <circle cx="38" cy="12" r="5" fill="#22D3EE"/>
      <circle cx="63.33" cy="12" r="5" fill="#94A3B8"/>
      <circle cx="12.66" cy="36" r="5" fill="#94A3B8"/>
      <circle cx="38" cy="36" r="5" fill="#8B5CF6"/>
      <circle cx="63.33" cy="36" r="5" fill="#94A3B8"/>
      <circle cx="12.66" cy="60" r="5" fill="#10B981"/>
      <circle cx="38" cy="60" r="5" fill="#10B981"/>
      <circle cx="63.33" cy="60" r="5" fill="#10B981"/>
    </g>

    <!-- single clean verification badge -->
    <g transform="translate(176 164)">
      <circle cx="0" cy="0" r="25" fill="#10B981"/>
      <circle cx="0" cy="0" r="25" fill="none" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="2"/>
      <path d="M-11 0l8 8 16-19" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(330 92)" class="font">
    <text x="0" y="76" font-size="84" font-weight="800" fill="#0F172A" letter-spacing="-0.05em">CleanFrame</text>
    <text x="2" y="118" font-size="22" fill="#475569" letter-spacing="0.02em">The reproducible data-cleaning engine for Python</text>

    <g transform="translate(0 152)">
      <rect x="0" y="0" width="174" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="18" cy="20" r="5" fill="#22D3EE"/>
      <text x="34" y="26" font-size="17" font-weight="600" fill="#334155">deterministic</text>

      <rect x="188" y="0" width="126" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="206" cy="20" r="5" fill="#8B5CF6"/>
      <text x="222" y="26" font-size="17" font-weight="600" fill="#334155">diffable</text>

      <rect x="328" y="0" width="155" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="346" cy="20" r="5" fill="#10B981"/>
      <text x="362" y="26" font-size="17" font-weight="600" fill="#334155">reviewable</text>

      <rect x="497" y="0" width="132" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="515" cy="20" r="5" fill="#0EA5E9"/>
      <text x="531" y="26" font-size="17" font-weight="600" fill="#334155">offline</text>
    </g>

    <text x="2" y="224" class="mono" font-size="16" fill="#64748B">AI suggests · Pandas executes · Rules validate</text>
  </g>
</svg>
